<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rueda de la Fortuna</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            font-family: sans-serif;
        }

        .contenedor {
            position: relative;
            width: 300px;
            height: 300px;
        }

        /* La Rueda */
        .rueda {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #ecf0f1;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
            background: conic-gradient(
                #e74c3c 0deg 60deg, 
                #f1c40f 60deg 120deg, 
                #2ecc71 120deg 180deg, 
                #3498db 180deg 240deg, 
                #9b59b6 240deg 300deg, 
                #e67e22 300deg 360deg
            );
        }

        /* El marcador (flecha) */
        .marcador {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid white;
            z-index: 10;
        }

        button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Gira la Rueda</h1>
    
    <div class="contenedor">
        <div class="marcador"></div>
        <div class="rueda" id="rueda"></div>
    </div>

    <button onclick="girar()">¡GIRAR!</button>

    <script>
        let rotacionActual = 0;

        function girar() {
            // Genera un giro aleatorio entre 5 y 10 vueltas completas
            const extra = Math.floor(Math.random() * 360);
            rotacionActual += 1800 + extra; 
            
            document.getElementById('rueda').style.transform = `rotate(${rotacionActual}deg)`;
        }
    </script>

</body>
</html>
